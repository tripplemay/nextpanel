    type: http
    behavior: ipcidr
    url: "https://vpn.vpanel.cc/api/rules/telegramcidr"
    path: ./rules/telegramcidr.yaml
    interval: 86400
  netflix:
    type: http
    behavior: classical
    url: "https://vpn.vpanel.cc/api/rules/netflix"
    path: ./rules/netflix.yaml
    interval: 86400
  youtube:
    type: http
    behavior: classical
    url: "https://vpn.vpanel.cc/api/rules/youtube"
    path: ./rules/youtube.yaml
    interval: 86400
  apple:
    type: http
