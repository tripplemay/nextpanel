mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: :9090

rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://vpn.vpanel.cc/api/rules/reject"
    path: ./rules/reject.yaml
    interval: 86400
  proxy:
    type: http
    behavior: domain
    url: "https://vpn.vpanel.cc/api/rules/proxy"
    path: ./rules/proxy.yaml
    interval: 86400
  direct:
