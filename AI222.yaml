    url: "https://vpn.vpanel.cc/api/rules/microsoft"
    path: ./rules/microsoft.yaml
    interval: 86400
  openai:
    type: http
    behavior: classical
    url: "https://vpn.vpanel.cc/api/rules/openai"
    path: ./rules/openai.yaml
    interval: 86400

