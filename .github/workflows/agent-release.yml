name: Release Agent

on:
  push:
    tags:
      - 'agent/v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum

      - name: Build binaries
        run: |
          cd apps/agent
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o agent-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o agent-linux-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/agent/agent-linux-amd64
            apps/agent/agent-linux-arm64
          generate_release_notes: true
