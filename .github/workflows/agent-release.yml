name: Release Agent

on:
  push:
    branches: [main]
    paths: ['apps/agent/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum

      - name: Extract agent version
        id: version
        run: |
          VERSION=$(grep -E '^\s+version\s*=' apps/agent/main.go | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=agent/v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected agent version: $VERSION"

      - name: Check if release already exists
        id: tag_check
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          if gh release view "${{ steps.version.outputs.TAG }}" --repo tripplemay/nextpanel-releases &>/dev/null; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.TAG }} already exists — skipping release"
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.TAG }} is new — will create release"
          fi

      - name: Build binaries
        if: steps.tag_check.outputs.EXISTS == 'false'
        run: |
          cd apps/agent
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o agent-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o agent-linux-arm64 .

      - name: Create GitHub Release
        if: steps.tag_check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          repository: tripplemay/nextpanel-releases
          token: ${{ secrets.RELEASES_PAT }}
          tag_name: ${{ steps.version.outputs.TAG }}
          files: |
            apps/agent/agent-linux-amd64
            apps/agent/agent-linux-arm64
          generate_release_notes: true
