name: Deploy — 项目自动部署

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          # 清空 src 目录，确保已从 git 删除的文件不残留在 VPS
          sshpass -p "$SSH_PASSWORD" \
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "rm -rf /opt/apps/nextpanel/apps/server/src /opt/apps/nextpanel/apps/web/src /opt/apps/nextpanel/apps/web/app /opt/apps/nextpanel/packages"
          tar czf - --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='dist' . | \
            sshpass -p "$SSH_PASSWORD" \
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p /opt/apps/nextpanel && tar xzf - -C /opt/apps/nextpanel"

      - name: Setup and deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 30m
          envs: CERTBOT_EMAIL,DOMAIN
          script: |
            set -e
            DOMAIN="${DOMAIN}"
            APP_DIR="/opt/apps/nextpanel"
            SETUP_DONE="/opt/.nextpanel_setup_done"
            export DEBIAN_FRONTEND=noninteractive

            # ── 首次安装：环境初始化（幂等，后续跳过）──────────────────────
            if [ ! -f "$SETUP_DONE" ]; then
              echo ">>> 首次运行，初始化服务器环境..."
              apt-get update -qq
              apt-get install -y curl git openssl build-essential python3

              if ! command -v node &>/dev/null; then
                curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
                apt-get install -y nodejs
              fi

              npm install -g pnpm pm2

              if ! command -v psql &>/dev/null; then
                apt-get install -y postgresql postgresql-contrib
                systemctl enable postgresql
                systemctl start postgresql
              fi

              if ! command -v nginx &>/dev/null; then
                apt-get install -y nginx
                systemctl enable nginx
                systemctl start nginx
              fi

              if ! command -v certbot &>/dev/null; then
                apt-get install -y certbot python3-certbot-nginx
              fi

              DB_PASS=$(openssl rand -hex 16)
              JWT_SECRET=$(openssl rand -hex 32)
              ENC_KEY=$(openssl rand -hex 32)

              sudo -u postgres psql -c "CREATE USER nextpanel WITH PASSWORD '$DB_PASS';" 2>/dev/null || true
              sudo -u postgres psql -c "CREATE DATABASE nextpanel OWNER nextpanel;" 2>/dev/null || true

              mkdir -p $APP_DIR/apps/server
              printf 'DATABASE_URL=postgresql://nextpanel:%s@localhost:5432/nextpanel\nJWT_SECRET=%s\nJWT_EXPIRES_IN=7d\nENCRYPTION_KEY=%s\nPORT=3001\nALLOWED_ORIGIN=https://%s\n' "$DB_PASS" "$JWT_SECRET" "$ENC_KEY" "$DOMAIN" > $APP_DIR/apps/server/.env

              cat > /etc/nginx/sites-available/nextpanel << NGINXEOF
server {
  listen 80;
  server_name $DOMAIN;

  location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade \$http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Host \$host;
    proxy_set_header X-Real-IP \$remote_addr;
    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto \$scheme;
    proxy_cache_bypass \$http_upgrade;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade \$http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Host \$host;
    proxy_set_header X-Real-IP \$remote_addr;
    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto \$scheme;
    proxy_cache_bypass \$http_upgrade;
  }
}
NGINXEOF

              rm -f /etc/nginx/sites-enabled/default
              ln -sf /etc/nginx/sites-available/nextpanel /etc/nginx/sites-enabled/
              nginx -t && systemctl reload nginx

              certbot --nginx -d $DOMAIN --non-interactive --agree-tos -m $CERTBOT_EMAIL

              systemctl enable certbot.timer 2>/dev/null || (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet --deploy-hook 'systemctl reload nginx'") | crontab -

              pm2 startup systemd -u root --hp /root 2>/dev/null | tail -n 1 | bash || true

              touch "$SETUP_DONE"
              echo ">>> 环境初始化完成"
            fi

            # ── 每次部署都执行 ─────────────────────────────────────────────
            # 同步面板配置（PANEL_URL / GITHUB_REPO 可能随部署变更）
            grep -q '^PANEL_URL=' $APP_DIR/apps/server/.env \
              && sed -i "s|^PANEL_URL=.*|PANEL_URL=https://$DOMAIN|" $APP_DIR/apps/server/.env \
              || echo "PANEL_URL=https://$DOMAIN" >> $APP_DIR/apps/server/.env
            grep -q '^GITHUB_REPO=' $APP_DIR/apps/server/.env \
              && sed -i 's|^GITHUB_REPO=.*|GITHUB_REPO=tripplemay/nextpanel-releases|' $APP_DIR/apps/server/.env \
              || echo 'GITHUB_REPO=tripplemay/nextpanel-releases' >> $APP_DIR/apps/server/.env

            # 先停服务，释放内存供构建使用
            pm2 stop all 2>/dev/null || true

            # ── 安装/检测 Xray（节点连通性测试客户端，幂等）────────────────
            if ! command -v xray &>/dev/null; then
              echo ">>> 安装 Xray 测试客户端..."
              (
                apt-get install -y unzip 2>/dev/null || true
                ARCH=$(uname -m | sed 's/x86_64/64/;s/aarch64/arm64-v8a/')
                curl -fL --max-time 60 "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-${ARCH}.zip" \
                  -o /tmp/xray.zip
                unzip -o /tmp/xray.zip xray -d /usr/local/bin/
                chmod +x /usr/local/bin/xray
                rm /tmp/xray.zip
                echo ">>> Xray installed: $(xray version | head -1)"
              ) || echo ">>> WARNING: Xray 安装失败，跳过。Xray 连通性测试功能将不可用。"
            fi

            # ── 安装/检测 sing-box（Hysteria2 连通性测试客户端，幂等）────────
            if ! command -v sing-box &>/dev/null; then
              echo ">>> 安装 sing-box 测试客户端..."
              (
                apt-get install -y unzip 2>/dev/null || true
                ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
                SB_TAG=$(curl -sf --max-time 15 "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
                curl -fL --max-time 120 "https://github.com/SagerNet/sing-box/releases/download/${SB_TAG}/sing-box-${SB_TAG#v}-linux-${ARCH}.tar.gz" \
                  -o /tmp/sing-box.tar.gz
                tar xzf /tmp/sing-box.tar.gz -C /tmp/
                mv /tmp/sing-box-*/sing-box /usr/local/bin/sing-box
                chmod +x /usr/local/bin/sing-box
                rm -rf /tmp/sing-box.tar.gz /tmp/sing-box-*/
                echo ">>> sing-box installed: $(sing-box version | head -1)"
              ) || echo ">>> WARNING: sing-box 安装失败，跳过。Hysteria2 连通性测试功能将不可用。"
            fi

            cd $APP_DIR
            pnpm install
            cd $APP_DIR/apps/server && pnpm exec prisma generate && cd $APP_DIR
            find $APP_DIR -name "*.tsbuildinfo" -delete

            # 顺序构建（避免并行 OOM），限制 Node 堆内存
            export NODE_OPTIONS="--max-old-space-size=512"
            pnpm -r --workspace-concurrency=1 build
            unset NODE_OPTIONS

            cd $APP_DIR/apps/server
            pnpm exec prisma migrate deploy

            pm2 delete nextpanel-server 2>/dev/null || true
            pm2 start pnpm --name nextpanel-server --cwd $APP_DIR/apps/server -- run start

            pm2 delete nextpanel-web 2>/dev/null || true
            pm2 start pnpm --name nextpanel-web --cwd $APP_DIR/apps/web -- run start

            pm2 save

            sleep 5
            echo "=== PM2 进程状态 ==="
            pm2 list
            echo "=== nextpanel-server 日志（最后20行）==="
            pm2 logs nextpanel-server --lines 20 --nostream
            echo "=== nextpanel-web 日志（最后20行）==="
            pm2 logs nextpanel-web --lines 20 --nostream

            echo ">>> Deploy completed at $(date) — https://$DOMAIN"
        env:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          DOMAIN: ${{ vars.DOMAIN }}
