name: Deploy — 项目自动部署

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            if [ -d /opt/apps/nextpanel ]; then
              cd /opt/apps/nextpanel
              git pull origin main
            else
              mkdir -p /opt/apps
              git clone https://github.com/tripplemay/nextpanel.git /opt/apps/nextpanel
            fi
